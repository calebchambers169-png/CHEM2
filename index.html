<script>
/* ============ Quiz engine ============ */
const META = {
  newtonian:{name:"Newtonian Physics", desc:"Motion, force, mass vs weight, levers, pressure & measurement.", color:"var(--s-newtonian)"},
  gaslaws:{name:"Gas Laws", desc:"Boyle, Charles, Gay-Lussac, Dalton, Henry, Graham, Fick, diffusion.", color:"var(--s-gaslaws)"},
  kinetics:{name:"Kinetics & Thermodynamics", desc:"Energy, work, power, the four laws, heat transfer, phase change.", color:"var(--s-kinetics)"},
  fluids:{name:"Fluids & Flow", desc:"Poiseuille, Reynolds, Bernoulli, Venturi, Coanda, Laplace, surfactant.", color:"var(--s-fluids)"},
  energy:{name:"Energy Production", desc:"ATP, glycolysis, Krebs, oxidative phosphorylation, O₂ curve shifts.", color:"var(--s-energy)"}
};
const ORDER = ["newtonian","gaslaws","kinetics","fluids","energy"];
const app = document.getElementById("app");

// Give every question a stable id + section tag
ORDER.forEach(sec=>{
  window.QB[sec].forEach((q,i)=>{ q._sec=sec; q._id=sec+"-"+i; });
});
function allQuestions(){ return ORDER.flatMap(s=>window.QB[s]); }
function sectionCount(s){ return window.QB[s].length; }
function totalCount(){ return allQuestions().length; }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function norm(s){ return (s||"").toLowerCase().trim().replace(/\s+/g," ").replace(/[.,;:'’"()°]/g,"").replace(/×/g,"x"); }
function fibMatch(input, answers){
  const n = norm(input); if(!n) return false;
  return answers.some(a=>{ const na=norm(a); return n===na || n.replace(/[-\s]/g,"")===na.replace(/[-\s]/g,""); });
}

/* ============ State ============ */
let quiz = null; // {questions, idx, answered[], correct[], title, tagColor, config}

/* ============ Rendering: HOME ============ */
function renderHome(){
  quiz=null;
  let secCards = ORDER.map(s=>{
    const m=META[s], n=sectionCount(s);
    const mc=window.QB[s].filter(q=>q.t==="mc").length, fib=n-mc;
    return `<button class="card" style="--sc:${m.color}" onclick="startSection('${s}')">
      <span class="bar"></span>
      <span class="ttl">${m.name}</span>
      <span class="meta">${n} QUESTIONS · ${mc} MC · ${fib} FILL-IN</span>
      <span class="desc">${m.desc}</span>
    </button>`;
  }).join("");

  app.innerHTML = `
  <header class="top">
    <div class="eyebrow">Chemistry &amp; Physics for Nurse Anesthesia · 2026</div>
    <h1>Exam Review &amp; Practice Bank</h1>
    <div class="sub">Multiple-choice &amp; fill-in-the-blank drills built from your five lecture decks.</div>
    <div class="stat-line">${totalCount()} QUESTIONS · 5 SECTIONS · IMMEDIATE FEEDBACK &amp; EXPLANATIONS</div>
  </header>

  <h2 class="section-head">Study by section</h2>
  <div class="grid two">${secCards}</div>

  <h2 class="section-head">Mix sections together</h2>
  <div id="mixPanel"></div>

  <h2 class="section-head">Final sample test</h2>
  <button class="card wide" style="--sc:var(--s-final)" onclick="startFinal()">
    <span class="bar"></span>
    <span class="ttl">Comprehensive Final — 100 questions</span>
    <span class="meta">ALL 5 SECTIONS · RANDOMIZED · MIXED MC &amp; FILL-IN</span>
    <span class="desc">A full-length mixed exam drawn evenly across every topic. Score and per-section breakdown at the end.</span>
  </button>

  <footer class="foot">BUILT FROM: NEWTONIAN PHYSICS · GAS LAWS · KINETICS &amp; THERMODYNAMICS · FLUIDS &amp; FLOW · ENERGY PRODUCTION</footer>
  `;
  renderMixPanel();
}

/* ============ Mix panel ============ */
let mixState = { secs:new Set(ORDER), count:25, types:new Set(["mc","fib"]) };
function renderMixPanel(){
  const p=document.getElementById("mixPanel");
  const secChips = ORDER.map(s=>`<span class="chip" role="button" tabindex="0"
      aria-pressed="${mixState.secs.has(s)}" data-sec="${s}"
      onclick="toggleMixSec('${s}')" onkeydown="chipKey(event,()=>toggleMixSec('${s}'))">${META[s].name}</span>`).join("");
  const typeChips = [["mc","Multiple choice"],["fib","Fill-in-blank"]].map(([t,l])=>
    `<span class="chip" role="button" tabindex="0" aria-pressed="${mixState.types.has(t)}"
      onclick="toggleMixType('${t}')" onkeydown="chipKey(event,()=>toggleMixType('${t}'))">${l}</span>`).join("");
  const counts=[10,25,50,75,"All"].map(c=>`<span class="chip" role="button" tabindex="0"
      aria-pressed="${(c==='All'&&mixState.count==='All')||mixState.count===c}"
      onclick="setMixCount(${c==='All'?"'All'":c})" onkeydown="chipKey(event,()=>setMixCount(${c==='All'?"'All'":c}))">${c}</span>`).join("");
  const avail = poolFor().length;
  p.innerHTML = `<div class="panel">
    <h3>Build a custom mixed quiz</h3>
    <p class="hint">Pick any combination of sections, question types, and length. Questions are randomized each run.</p>
    <label class="field">Sections</label>
    <div class="row">${secChips}</div>
    <label class="field">Question types</label>
    <div class="row">${typeChips}</div>
    <label class="field">Number of questions</label>
    <div class="row">${counts}</div>
    <div class="btn-row">
      <button class="btn" id="mixGo" onclick="startMix()" ${avail===0?"disabled":""}>Start mixed quiz →</button>
      <span class="qcount">${avail} question${avail===1?"":"s"} available</span>
    </div>
  </div>`;
}
function poolFor(){
  return allQuestions().filter(q=>mixState.secs.has(q._sec) && mixState.types.has(q.t));
}
window.toggleMixSec=s=>{ if(mixState.secs.has(s))mixState.secs.delete(s); else mixState.secs.add(s); if(mixState.secs.size===0)mixState.secs.add(s); renderMixPanel(); };
window.toggleMixType=t=>{ if(mixState.types.has(t))mixState.types.delete(t); else mixState.types.add(t); if(mixState.types.size===0)mixState.types.add(t); renderMixPanel(); };
window.setMixCount=c=>{ mixState.count=c; renderMixPanel(); };
window.chipKey=(e,fn)=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();fn();} };

/* ============ Quiz starters ============ */
window.startSection=function(s){
  const qs = shuffle(window.QB[s]);
  launch(qs, META[s].name, META[s].color, {kind:"section"});
};
window.startMix=function(){
  let pool = shuffle(poolFor());
  if(mixState.count!=="All") pool = pool.slice(0, mixState.count);
  const names=[...mixState.secs].map(s=>META[s].name);
  const title = names.length===ORDER.length ? "Mixed — all sections" : "Mixed — "+names.join(", ");
  launch(pool, title, "var(--accent)", {kind:"mix"});
};
window.startFinal=function(){
  // Draw ~20 per section, mixed types, then top up to 100
  let picked=[];
  ORDER.forEach(s=>{ picked=picked.concat(shuffle(window.QB[s]).slice(0,20)); });
  picked = shuffle(picked);
  if(picked.length>100) picked=picked.slice(0,100);
  launch(picked, "Comprehensive Final", "var(--s-final)", {kind:"final"});
};

function launch(questions, title, tagColor, config){
  quiz = { questions, idx:0, title, tagColor, config,
    answered:new Array(questions.length).fill(null),   // stores chosen index (mc) or text (fib)
    correct:new Array(questions.length).fill(null) };  // true/false
  window.scrollTo(0,0);
  renderQuestion();
}

/* ============ Rendering: QUESTION ============ */
function renderQuestion(){
  const {questions,idx}=quiz;
  const q=questions[idx];
  const answeredCount = quiz.correct.filter(v=>v!==null).length;
  const score = quiz.correct.filter(v=>v===true).length;
  const pct = Math.round(((idx)/questions.length)*100);
  const m = META[q._sec];

  app.innerHTML = `
  <header class="top">
    <div class="eyebrow">${quiz.title}</div>
    <h1 style="font-size:23px">${escapeHtml(shortTitle())}</h1>
  </header>
  <div class="quizbar">
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="qcount">Q ${idx+1} / ${questions.length}</span>
    <span class="scorepill">${score} correct</span>
  </div>
  <div class="qcard">
    <span class="tag" style="background:${m.color}">${m.name}</span>
    <span class="qtype">${q.t==="mc"?"Multiple choice":"Fill in the blank"}</span>
    <div class="qtext">${escapeHtml(q.q)}</div>
    <div id="answerZone"></div>
    <div class="fb" id="fb"></div>
    <div class="nav-row" id="navRow"></div>
  </div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn ghost sm" onclick="quitToHome()">Exit to menu</button>
  </div>
  ${q.t==="fib"?'<div class="kbd-hint">Press <kbd>Enter</kbd> to submit</div>':'<div class="kbd-hint">Press <kbd>1</kbd>–<kbd>4</kbd> to answer</div>'}
  `;

  const zone=document.getElementById("answerZone");
  const prior=quiz.answered[idx];
  if(q.t==="mc") renderMC(q,zone,prior);
  else renderFIB(q,zone,prior);

  if(quiz.correct[idx]!==null) revealState();
  else renderNav(false);
}
function shortTitle(){
  const q=quiz.questions[quiz.idx];
  return quiz.config.kind==="section" ? META[q._sec].name+" review"
       : quiz.config.kind==="final" ? "Final sample test"
       : "Custom mixed quiz";
}

function renderMC(q,zone,prior){
  zone.innerHTML=`<div class="opts">${q.o.map((o,i)=>
    `<button class="opt" data-i="${i}" onclick="answerMC(${i})">
      <span class="key">${String.fromCharCode(65+i)}</span>
      <span>${escapeHtml(o)}</span>
    </button>`).join("")}</div>`;
}
function renderFIB(q,zone,prior){
  zone.innerHTML=`<form class="fib-form" onsubmit="return submitFIB(event)">
    <input class="fib-input" id="fibInput" type="text" autocomplete="off" autocapitalize="off"
      spellcheck="false" placeholder="Type your answer…" ${prior!=null?`value="${escapeAttr(prior)}"`:""}>
    <button class="btn sm" type="submit">Check</button>
  </form>`;
  setTimeout(()=>{const el=document.getElementById("fibInput"); if(el && quiz.correct[quiz.idx]===null) el.focus();},30);
}

/* ============ Answering ============ */
window.answerMC=function(i){
  const idx=quiz.idx, q=quiz.questions[idx];
  if(quiz.correct[idx]!==null) return; // locked
  quiz.answered[idx]=i;
  quiz.correct[idx]=(i===q.a);
  revealState();
};
window.submitFIB=function(e){
  e.preventDefault();
  const idx=quiz.idx, q=quiz.questions[idx];
  if(quiz.correct[idx]!==null) return false;
  const val=document.getElementById("fibInput").value;
  if(!val.trim()) return false;
  quiz.answered[idx]=val;
  quiz.correct[idx]=fibMatch(val,q.a);
  revealState();
  return false;
};

function revealState(){
  const idx=quiz.idx, q=quiz.questions[idx];
  const isRight=quiz.correct[idx]===true;
  const fb=document.getElementById("fb");

  if(q.t==="mc"){
    const btns=[...document.querySelectorAll(".opt")];
    btns.forEach(b=>{
      const i=+b.dataset.i; b.disabled=true;
      if(i===q.a) b.classList.add("correct");
      if(i===quiz.answered[idx] && i!==q.a) b.classList.add("wrong");
      if(i!==q.a && i!==quiz.answered[idx]) b.classList.add("dim");
    });
    fb.className="fb show "+(isRight?"ok":"no");
    fb.innerHTML = `<div class="verdict">${isRight?"✓ Correct":"✗ Not quite"}</div>`+
      (isRight?"":`<div class="ans">Correct answer: <b>${String.fromCharCode(65+q.a)}) ${escapeHtml(q.o[q.a])}</b></div>`)+
      `<div class="exp">${escapeHtml(q.e)}</div>`;
  } else {
    const el=document.getElementById("fibInput");
    if(el){ el.disabled=true; el.classList.add(isRight?"correct":"wrong"); }
    const primary = q.a[0];
    fb.className="fb show "+(isRight?"ok":"no");
    fb.innerHTML = `<div class="verdict">${isRight?"✓ Correct":"✗ Not quite"}</div>`+
      `<div class="ans">Accepted answer: <b>${escapeHtml(primary)}</b>${q.a.length>1?` <span style="color:var(--ink-soft)">(also: ${q.a.slice(1).map(escapeHtml).join(", ")})</span>`:""}</div>`+
      `<div class="exp">${escapeHtml(q.e)}</div>`;
  }
  // update score pill live
  const sp=document.querySelector(".scorepill");
  if(sp) sp.textContent=quiz.correct.filter(v=>v===true).length+" correct";
  renderNav(true);
}

function renderNav(answered){
  const nav=document.getElementById("navRow");
  const last = quiz.idx===quiz.questions.length-1;
  nav.innerHTML=`
    <button class="btn ghost sm" onclick="prevQ()" ${quiz.idx===0?"disabled":""}>← Back</button>
    <button class="btn sm" id="nextBtn" onclick="nextQ()" ${answered?"":"disabled"}>
      ${last?"See results →":"Next →"}
    </button>`;
}
window.prevQ=function(){ if(quiz.idx>0){quiz.idx--; window.scrollTo(0,0); renderQuestion();} };
window.nextQ=function(){
  if(quiz.correct[quiz.idx]===null) return;
  if(quiz.idx===quiz.questions.length-1){ renderResults(); }
  else { quiz.idx++; window.scrollTo(0,0); renderQuestion(); }
};

/* ============ Results ============ */
let reviewFilter="all";
function renderResults(){
  window.scrollTo(0,0);
  const total=quiz.questions.length;
  const score=quiz.correct.filter(v=>v===true).length;
  const pct=Math.round((score/total)*100);
  const grade = pct>=90?"Excellent":pct>=80?"Strong":pct>=70?"Passing":pct>=60?"Review needed":"Keep studying";

  // per-section breakdown
  const bySec={};
  quiz.questions.forEach((q,i)=>{
    (bySec[q._sec]=bySec[q._sec]||{c:0,t:0}); bySec[q._sec].t++;
    if(quiz.correct[i]) bySec[q._sec].c++;
  });
  const secRows = ORDER.filter(s=>bySec[s]).map(s=>{
    const b=bySec[s], p=Math.round(b.c/b.t*100);
    return `<div class="review-item" style="--sc:${META[s].color}">
      <div class="review-q"><b>${META[s].name}</b></div>
      <div class="review-meta">${b.c} / ${b.t} correct · ${p}%</div>
    </div>`;
  }).join("");

  app.innerHTML=`
  <header class="top">
    <div class="eyebrow">${quiz.title}</div>
    <h1>Results</h1>
  </header>
  <div class="result-hero">
    <div class="result-score">${score}<span class="slash"> / ${total}</span></div>
    <div class="result-pct">${pct}% CORRECT</div>
    <div class="result-grade" style="color:${pct>=70?'var(--good)':pct>=60?'var(--gold)':'var(--bad)'}">${grade}</div>
  </div>
  <div class="btn-row" style="justify-content:center;margin:18px 0 8px">
    <button class="btn" onclick="retrySame()">Retry this set</button>
    <button class="btn ghost" onclick="retryMissed()" ${score===total?"disabled":""}>Redo missed only (${total-score})</button>
    <button class="btn ghost" onclick="renderHome()">Menu</button>
  </div>
  ${ORDER.filter(s=>bySec[s]).length>1?`<h2 class="section-head">By section</h2>${secRows}`:""}
  <h2 class="section-head">Review answers</h2>
  <div class="filter-row">
    <span class="chip" role="button" tabindex="0" aria-pressed="${reviewFilter==='all'}" onclick="setFilter('all')" onkeydown="chipKey(event,()=>setFilter('all'))">All (${total})</span>
    <span class="chip" role="button" tabindex="0" aria-pressed="${reviewFilter==='miss'}" onclick="setFilter('miss')" onkeydown="chipKey(event,()=>setFilter('miss'))">Missed (${total-score})</span>
    <span class="chip" role="button" tabindex="0" aria-pressed="${reviewFilter==='hit'}" onclick="setFilter('hit')" onkeydown="chipKey(event,()=>setFilter('hit'))">Correct (${score})</span>
  </div>
  <div id="reviewList"></div>
  <footer class="foot">CHEMISTRY &amp; PHYSICS FOR NURSE ANESTHESIA · 2026</footer>
  `;
  renderReviewList();
}
window.setFilter=f=>{ reviewFilter=f; document.querySelectorAll(".filter-row .chip").forEach(c=>c.setAttribute("aria-pressed","false")); renderResults(); };
function renderReviewList(){
  const list=document.getElementById("reviewList");
  let html="";
  quiz.questions.forEach((q,i)=>{
    const hit=quiz.correct[i]===true;
    if(reviewFilter==="miss"&&hit) return;
    if(reviewFilter==="hit"&&!hit) return;
    const your = q.t==="mc"
      ? (quiz.answered[i]!=null? String.fromCharCode(65+quiz.answered[i])+") "+q.o[quiz.answered[i]] : "—")
      : (quiz.answered[i]||"—");
    const corr = q.t==="mc" ? String.fromCharCode(65+q.a)+") "+q.o[q.a] : q.a[0];
    html+=`<div class="review-item ${hit?'hit':'miss'}">
      <div class="review-q"><span class="rev-badge ${hit?'hit':'miss'}">${hit?'✓':'✗'}</span>${escapeHtml(q.q)}</div>
      ${hit?"":`<div class="review-meta">Your answer: ${escapeHtml(your)}</div>`}
      <div class="review-meta">Correct: <b>${escapeHtml(corr)}</b></div>
      <div class="review-meta" style="margin-top:5px">${escapeHtml(q.e)}</div>
    </div>`;
  });
  list.innerHTML = html || `<p class="hint" style="color:var(--ink-soft)">Nothing to show here.</p>`;
}
window.retrySame=function(){ launch(shuffle(quiz.questions), quiz.title, quiz.tagColor, quiz.config); };
window.retryMissed=function(){
  const missed=quiz.questions.filter((q,i)=>quiz.correct[i]!==true);
  if(missed.length) launch(shuffle(missed), quiz.title+" · missed", quiz.tagColor, quiz.config);
};
window.quitToHome=function(){
  const done=quiz.correct.filter(v=>v!==null).length;
  if(done>0 && !confirm("Exit this quiz? Your progress on it will be lost.")) return;
  renderHome();
};

/* ============ Utils ============ */
function escapeHtml(s){ return (s+"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,"&quot;"); }

/* keyboard */
document.addEventListener("keydown",e=>{
  if(!quiz) return;
  const q=quiz.questions[quiz.idx];
  if(quiz.correct[quiz.idx]===null && q.t==="mc" && ["1","2","3","4"].includes(e.key)){
    const i=+e.key-1; if(i<q.o.length) answerMC(i);
  } else if(quiz.correct[quiz.idx]!==null && (e.key==="Enter"||e.key==="ArrowRight")){
    const nb=document.getElementById("nextBtn"); if(nb && !nb.disabled) nextQ();
  } else if(e.key==="ArrowLeft"){ if(quiz.idx>0) prevQ(); }
});

renderHome();

</script>
</body>
</html>
